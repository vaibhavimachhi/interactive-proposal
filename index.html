<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me ?</title>

<style>
    body{
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        background-color: pink;
    }

    img{
        width: 250px;
        margin-top: 40px;
    }

    h1{
        margin-top: 20px;
    }

    button{
        padding: 10px 20px;
        font: size 16px;
        margin: 10px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
    }

    #yesbtn{
        background-color: #4caf50;
        color: white;
        font-size: 16px; /*starting size*/
    }

    #nobtn{
        background-color: #ff4d4d;
        color: white;
    }
</style>

<script>
    
    let yessize = 16; // starting size

    let step = 0;

    const stickers = [

        "gif/first.gif",
        "gif/second.gif",
        "gif/third.gif",
        "gif/forth.gif",
        "gif/fifth.gif",
        "gif/six.gif",
        "gif/seven.gif",
        "gif/eight.gif",
        "gif/nine.gif"
    ];

    const notexts = [
        "Please🥺",
        "Cutie Please🥺",
        "Are you sure?🥺",
        "Think again🥺",
        "Please mat bolo no😢",
        "Ek baar aur soch lo😔",
        "Please Please😭",
        "Don't break my heart😭",
        "Say yes please💘"
        
    ];

    function noclick() {
        if (step < 9)
        {
            

            // change sticker
            document.getElementById("sticker").src = stickers[step];

            //change no text
            document.getElementById("nobtn").innerText = notexts[step];

            //yes btn size increase
            yessize += 6;

            document.getElementById("yesbtn").style.fontSize = yessize + "px";

            step++;

        }
        else
        {
            document.getElementById("nobtn").style.display = "none";
            
            document.getElementById("qsn").innerText = "You have no option left Say Yes!😉";

            document.getElementById("sticker").src ="gif/eleven.gif";

        }
    }

    function yesclick(){
        document.getElementById("qsn").innerText = "Yayyy!! I knew you would say yes🥰 😍 💖";

        document.getElementById("sticker").src ="gif/Yay.gif";

        document.getElementById("nobtn").style.display = "none";

        document.getElementById("yesbtn").style.display = "none";
    }

</script>
</head>
<body>

    <div>
        <img id="sticker" src="gif/purposal.gif">
    </div>
    <div>
        <h1 id="qsn">Will you be my valentine ?</h1>
    </div>
    <div>
        <button id="yesbtn" onclick="yesclick()">Yes </button>
        <button id="nobtn" onclick="noclick()">No </button>
    </div>
    
    
</body>
</html>
